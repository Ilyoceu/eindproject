{% extends "layout.html" %}

{% block body %}
<div class="form-container">
    <div class="input-container">
        <div class="form-header">
            <h3>Change Password</h3>
        </div>
        {% if error %}
            <div class="error-message" style="color: red; margin-bottom: 10px;">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success-message" style="color: green; margin-bottom: 10px;">{{ success }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('change_password') }}">
            <div>
                <input type="password" name="current_password" placeholder="Current password" required style="margin-top: 10px; margin-bottom: 10px;">
            </div>
            <div>
                <input type="password" name="new_password" placeholder="New password" required style="margin-top: 10px; margin-bottom: 10px;">
            </div>
            <div>
                <input type="password" name="new_password_confirm" placeholder="Confirm new password" required style="margin-top: 10px; margin-bottom: 10px;">
            </div>
            <div class="botton">
                <button class="submit" type="submit">Change Password</button>
            </div>
        </form>
        <div style="margin-top:12px;">
            <a href="{{ url_for('profile') }}">Back to profile</a>
        </div>
    </div>
</div>
{% endblock %}
